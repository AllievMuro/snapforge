<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sf-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="sf-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="60%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#F0F4F8"/>

  <!-- Snap text -->
  <text
    x="256"
    y="226"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="108"
    letter-spacing="-5"
    text-anchor="middle"
    fill="#1E293B"
  >Snap</text>

  <!-- forge text in blue gradient -->
  <text
    x="256"
    y="336"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="108"
    letter-spacing="-5"
    text-anchor="middle"
    fill="url(#sf-grad)"
  >forge</text>

  <!-- Accent underline beneath 'forge' -->
  <rect x="108" y="350" width="296" height="5" rx="2.5" fill="url(#sf-grad)"/>

  <!-- Small accent bolt/snap mark between words — a lightning-like cut -->
  <!-- Tiny monospace tagline -->
  <text
    x="256"
    y="392"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="13"
    letter-spacing="1.5"
    text-anchor="middle"
    fill="#2563EB"
    opacity="0.75"
  >deterministic chain forks</text>

  <!-- Small decorative dot accent on the 'S' corner — top-left spark -->
  <circle cx="108" cy="148" r="5" fill="#3B82F6" opacity="0.6"/>
  <circle cx="404" cy="148" r="3.5" fill="#2563EB" opacity="0.4"/>
</svg>